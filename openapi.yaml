openapi: 3.0.3
info:
  title: Intentionally Vulnerable Flask API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /:
    get:
      summary: Homepage
      responses:
        '200':
          description: OK
  /search:
    get:
      summary: Search Users (Vulnerable to SQL Injection)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            example: admin
      responses:
        '200':
          description: Returns search results
  /login:
    post:
      summary: Admin Login and Remote Eval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: SuperSecretPassword123!
                extra_command:
                  type: string
                  example: 1+1
      responses:
        '200':
          description: Login successful and code evaluated
        '401':
          description: Unauthorized
