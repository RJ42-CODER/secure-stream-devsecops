name: Secure Stream DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # === STEP 1: CHECKOUT CODE ===
      - name: Checkout Code
        uses: actions/checkout@v4

      # === STEP 2: SET UP ENVIRONMENT ===
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # === STEP 3: TANVI'S SAST SCAN (BANDIT) ===
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: bandit -r src/ -ll

      # === STEP 4: DEPENDENCY PREPARATION ===
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # === STEP 5: RACHANA'S DEPENDENCY SCAN (SNYK) ===
      - name: Snyk Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # === STEP 6: DOCKER CONTAINER BUILD ===
      - name: Build Docker Image
        run: docker build -t secure-stream-app .

      # === STEP 7: RACHANA'S CONTAINER SCAN (TRIVY) ===
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-stream-app
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1 # FIXED: Yeh step ab image flaws par pipeline fail karega

      # === STEP 8: RUN APPLICATION IN BACKGROUND ===
      - name: Run Flask in background
        run: |
          docker run -d -p 5000:5000 --name flask-app secure-stream-app

      - name: Wait for Flask to start
        run: sleep 10

      # === STEP 9: RJ42'S DAST SCAN (OWASP ZAP) ===

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t secure-stream-app .

      - name: Run Flask in background
        run: |
          docker run -d -p 5000:5000 --name flask-app secure-stream-app

      - name: Wait for Flask to start
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000 && break || sleep 2
          done

      - name: Run the OWASP ZAP API scan
        run: |
          docker run --user root --rm --network host \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t /zap/wrk/openapi.yaml \
            -f openapi \
            -r report.html \
            -J report.json \
            -I || true

      - name: Evaluate Scan Results (Quality Gate)
        run: |
          if [ -f report.json ]; then
            # Parse json and find any alerts with riskcode >= 2 (Medium / High / Critical)
            ALERTS_COUNT=$(jq '[.site[].alerts[] | select(.riskcode | tonumber >= 2)] | length' report.json 2>/dev/null || echo 0)
            echo "============================================="
            echo "Active scan completed."
            echo "Vulnerabilities found with Severity >= Medium: $ALERTS_COUNT"
            echo "============================================="
            
            if [ "$ALERTS_COUNT" -gt 0 ]; then
              echo "FAILING PIPELINE: Found $ALERTS_COUNT Medium/High/Critical issues."
              exit 1
            fi
          else
            echo "ERROR: report.json was not generated!"
            exit 1
          fi

      - name: Upload Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            report.html
            report.json

